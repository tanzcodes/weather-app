<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Check — Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <p class="eyebrow">Sky Check</p>
    <h1>Weather, in one search</h1>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name (e.g. Karachi)">
      <button id="searchBtn">Search</button>
    </div>

    <div class="result" id="result">
      <p class="message">Type a city name above and hit search 👆</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
